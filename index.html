<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPI ACROSS</title>

<style>
body{
margin:0;
background:#060611;
font-family:Arial;
text-align:center;
padding-top:70px;
}

#rainbowText{
font-size:34px;
font-weight:bold;
animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
0%{color:red;}
14%{color:orange;}
28%{color:yellow;}
42%{color:lime;}
57%{color:cyan;}
71%{color:blue;}
85%{color:violet;}
100%{color:red;}
}

button{
margin-top:50px;
background:#111827;
color:#00ffee;
font-size:30px;
padding:18px 50px;
border:none;
border-radius:20px;
cursor:pointer;
}

.menu{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
width:370px;
border-radius:25px;
padding:30px;
color:white;
}

.fileBtn{
display:inline-block;
background:#00ccff;
padding:15px 25px;
border-radius:15px;
margin-top:20px;
cursor:pointer;
}

input{
display:none;
}

.toggleBox{
margin-top:25px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:26px;
}

.switch{
width:65px;
height:34px;
background:#333;
border-radius:40px;
position:relative;
cursor:pointer;
}

.switch:before{
content:'';
width:28px;
height:28px;
background:white;
border-radius:50%;
position:absolute;
top:3px;
left:4px;
transition:.3s;
}

.switch.active{
background:#00ff88;
}

.switch.active:before{
left:33px;
}

#headStatus{
margin-top:15px;
font-size:24px;
color:#00ff88;
display:none;
}

.loader{
display:none;
margin:25px auto;
border:8px solid #222;
border-top:8px solid cyan;
border-radius:50%;
width:70px;
height:70px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#done{
display:none;
font-size:30px;
color:#00ff88;
margin-top:20px;
}

.close{
margin-top:20px;
background:#ff4444;
}
</style>
</head>
<body>

<div id="rainbowText">
Loading...
</div>

<button onclick="openMenu()">
DPI
</button>


<div class="menu" id="menu">
<h2>DPI Buff Màn Across</h2>

<div class="toggleBox">
<span>🎯 Bám Đầu</span>
<div class="switch" onclick="toggleHead(this)"></div>
</div>

<div id="headStatus">
Headlock ON ✓
</div>

<label class="fileBtn">
📂 CHỌN FILE TỪ TỆP
<input type="file" onchange="startLoad()">
</label>

<div class="loader" id="loader"></div>

<div id="done">
✓ Thành Công
</div>

<button class="close" onclick="closeMenu()">
Đóng
</button>

</div>

<script>
let batteryLevel="--";

if(navigator.getBattery){
navigator.getBattery().then(function(battery){
function upBattery(){
batteryLevel=Math.floor(
battery.level*100
)+"%";
}
upBattery();
battery.addEventListener(
"levelchange",upBattery
);
});
}

function updateLine(){
let d=new Date();

rainbowText.innerHTML=
"⚙ DPI ACROSS | "+
d.toLocaleDateString()+
" | "+
d.toLocaleTimeString()+
" | 🔋 "+
batteryLevel;
}

setInterval(updateLine,1000);
updateLine();

function openMenu(){
menu.style.display="block";
}

function closeMenu(){
menu.style.display="none";
loader.style.display="none";
done.style.display="none";
}

function toggleHead(x){
x.classList.toggle("active");

if(x.classList.contains("active")){
headStatus.style.display="block";
}else{
headStatus.style.display="none";
}
}

function startLoad(){

done.style.display="none";
loader.style.display="block";

setTimeout(function(){
loader.style.display="none";
done.style.display="block";
},3000);

}
</script>

</body>
</html>
