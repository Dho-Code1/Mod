<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPI ACROSS</title>

<style>
body{
margin:0;
background:#060611;
font-family:Arial;
text-align:center;
padding-top:70px;
overflow:hidden;
}

#rainbowText{
font-size:34px;
font-weight:bold;
animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
0%{color:red;}
14%{color:orange;}
28%{color:yellow;}
42%{color:lime;}
57%{color:cyan;}
71%{color:blue;}
85%{color:violet;}
100%{color:red;}
}

/* Assistive Touch */
#homeBtn{
position:fixed;
right:30px;
bottom:120px;
width:70px;
height:70px;
border-radius:50%;
background:rgba(255,255,255,.25);
backdrop-filter:blur(8px);
border:3px solid white;
box-shadow:0 0 15px cyan;
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
cursor:pointer;
}

/* menu */
.menu{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
width:360px;
border-radius:25px;
padding:30px;
color:white;
}

.fileBtn{
display:inline-block;
background:#00ccff;
padding:18px 28px;
border-radius:16px;
margin-top:30px;
font-size:24px;
cursor:pointer;
}

input{
display:none;
}

.loader{
display:none;
margin:30px auto;
border:8px solid #222;
border-top:8px solid cyan;
border-radius:50%;
width:70px;
height:70px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

#done{
display:none;
font-size:30px;
color:#00ff88;
margin-top:20px;
}

.close{
margin-top:20px;
background:#ff4444;
border:none;
padding:15px 40px;
font-size:24px;
border-radius:16px;
color:white;
}

/* popup lưu ý */
.notice{
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#151525;
width:380px;
padding:30px;
border-radius:25px;
box-shadow:0 0 30px gold;
color:white;
}

.notice h2{
color:gold;
}

.notice button{
margin-top:20px;
background:#00cc88;
border:none;
padding:12px 35px;
border-radius:15px;
font-size:22px;
}
</style>
</head>
<body>

<div id="rainbowText">
Loading...
</div>

<!-- Menu -->
<div id="homeBtn" onclick="openMenu()">
◉
</div>


<div class="menu" id="menu">

<h2>DPI Across</h2>

<label class="fileBtn">
📂 CHỌN FILE DPI Được cấp 
<input type="file" onchange="startLoad()">
</label>

<div class="loader" id="loader"></div>

<div id="done">
✓ Thành Công
</div>

<br>

<button class="close" onclick="closeMenu()">
Đóng
</button>

</div>


<div class="notice" id="notice">
<h2>⚠ LƯU Ý</h2>

<p style="font-size:24px">
Khi cài DPI xong yêu cầu bạn<br>
<b>turn off the phone trong 10p</b><br>
và reboot.
</p>

<button onclick="closeNotice()">
OK
</button>

</div>


<script>
let batteryLevel="--";

if(navigator.getBattery){
navigator.getBattery().then(function(battery){

function upBattery(){
batteryLevel=
Math.floor(
battery.level*100
)+"%";
}

upBattery();
battery.addEventListener(
"levelchange",
upBattery
);

});
}

function updateLine(){

let d=new Date();

rainbowText.innerHTML=
" DPI ACROSS🧸 | "+
d.toLocaleDateString()+
" | "+
d.toLocaleTimeString()+
" | 🔋 "+
batteryLevel;

}

setInterval(updateLine,1000);
updateLine();


function openMenu(){
menu.style.display="block";
}

function closeMenu(){
menu.style.display="none";
}

function startLoad(){

done.style.display="none";
loader.style.display="block";

setTimeout(function(){

loader.style.display="none";
done.style.display="block";

setTimeout(function(){
notice.style.display="block";
},1200);

},3000);

}

function closeNotice(){
notice.style.display="none";
}
</script>

</body>
</html>
