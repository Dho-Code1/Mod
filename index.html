<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPI ACROSS</title>

<style>
body{
margin:0;
background:#050510;
display:flex;
justify-content:center;
align-items:flex-start;
height:100vh;
font-family:Arial;
padding-top:40px;
}

.topbar{
background:#111;
padding:18px 35px;
border-radius:30px;
box-shadow:0 0 25px cyan;
}

#rainbowText{
font-size:30px;
font-weight:bold;
white-space:nowrap;
animation:rainbow 4s linear infinite;
}

@keyframes rainbow{
0%{color:red;}
14%{color:orange;}
28%{color:yellow;}
42%{color:lime;}
57%{color:cyan;}
71%{color:blue;}
85%{color:violet;}
100%{color:red;}
}
</style>
</head>

<body>

<div class="topbar">
<div id="rainbowText">
Loading...
</div>
</div>

<script>
let batteryLevel="--";

if(navigator.getBattery){
navigator.getBattery().then(function(battery){

function updateBattery(){
batteryLevel=
Math.floor(
battery.level*100
)+"%";
}

updateBattery();

battery.addEventListener(
"levelchange",
updateBattery
);

});
}

function updateLine(){

let d=new Date();

let text=
"⚙ DPI ACROSS | " +
d.toLocaleDateString() +
" | " +
d.toLocaleTimeString() +
" | 🔋 " +
batteryLevel;

document.getElementById(
"rainbowText"
).innerHTML=text;

}

setInterval(updateLine,1000);
updateLine();

</script>

</body>
</html>
