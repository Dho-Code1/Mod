<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DPI ACROSS</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#090909,#111133);
font-family:Arial;
}

.panel{
width:400px;
background:#111;
padding:35px;
border-radius:30px;
box-shadow:0 0 35px cyan;
text-align:center;
}

.rainbow{
font-size:45px;
font-weight:bold;
animation:rainbow 5s linear infinite;
}

@keyframes rainbow{
0%{color:red;}
14%{color:orange;}
28%{color:yellow;}
42%{color:lime;}
57%{color:cyan;}
71%{color:blue;}
85%{color:violet;}
100%{color:red;}
}

.info{
margin-top:30px;
font-size:28px;
font-weight:bold;
animation:rainbow 5s linear infinite;
}

.box{
margin-top:25px;
padding:18px;
background:#1d1d2d;
border-radius:20px;
font-size:24px;
animation:rainbow 5s linear infinite;
box-shadow:0 0 15px #00ffff;
}
</style>
</head>

<body>

<div class="panel">

<div class="rainbow">
DPI ACROSS
</div>

<div class="box" id="clock">
Loading Time...
</div>

<div class="box" id="battery">
Battery Loading...
</div>

<div class="info">
⚡ Rainbow System Active
</div>

</div>

<script>

function updateClock(){
let d=new Date();

let time=d.toLocaleTimeString();
let date=d.toLocaleDateString();

document.getElementById("clock").innerHTML=
"📅 "+date+"<br>🕒 "+time;
}

setInterval(updateClock,1000);
updateClock();


if(navigator.getBattery){
navigator.getBattery().then(function(battery){

function updateBattery(){
document.getElementById("battery").innerHTML=
"🔋 Pin: "+Math.floor(
battery.level*100
)+"%";
}

updateBattery();

battery.addEventListener(
'levelchange',
updateBattery
);

});
}
else{
document.getElementById("battery").innerHTML=
"Battery API Not Supported";
}

</script>

</body>
</html>
